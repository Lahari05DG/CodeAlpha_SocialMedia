<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialApp - Register</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { font-size: 2em; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { color: #888; margin-top: 5px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; }
    input { width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; font-size: 1em; outline: none; transition: border 0.3s; }
    input:focus { border-color: #667eea; }
    .btn { width: 100%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 13px; border-radius: 10px; font-size: 1em; cursor: pointer; transition: transform 0.2s; }
    .btn:hover { transform: scale(1.02); }
    .link { text-align: center; margin-top: 20px; color: #888; }
    .link a { color: #667eea; text-decoration: none; font-weight: 600; }
    .message { text-align: center; margin-top: 15px; padding: 10px; border-radius: 8px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>📱 SocialApp</h1>
      <p>Create your account</p>
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name">
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Choose a username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Create a password">
    </div>
    <button class="btn" onclick="register()">Create Account</button>
    <div id="message"></div>
    <div class="link">
      <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script>
    async function register() {
      const name = document.getElementById('name').value;
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');

      if (!name || !username || !email || !password) {
        message.className = 'message error';
        message.textContent = 'Please fill all fields!';
        return;
      }

      try {
        const res = await fetch('http://localhost:5001/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, username, email, password })
        });
        const data = await res.json();
        if (res.ok) {
          message.className = 'message success';
          message.textContent = 'Registration successful! Redirecting to login...';
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          message.className = 'message error';
          message.textContent = data.message;
        }
      } catch (err) {
        message.className = 'message error';
        message.textContent = 'Something went wrong!';
      }
    }
  </script>
</body>
</html>
